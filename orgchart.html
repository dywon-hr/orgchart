<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>에비드넷 조직도</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{
  --bg:#f0ede8;--sur:#fff;--bdr:#dedad4;--bdr2:#c4c0b8;
  --txt:#1c1b18;--mut:#706e68;--lt:#a8a49e;
  --acc:#1b4380;--acc2:#e8edf8;
  --sh:0 2px 10px rgba(0,0,0,.08);--sh2:0 8px 28px rgba(0,0,0,.18);
  --r:10px;--grid:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;height:100vh;width:100vw}

/* TOPBAR */
#topbar{position:fixed;top:0;left:0;right:0;z-index:300;height:52px;
  background:var(--sur);border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;gap:8px;padding:0 16px}
#topbar h1{font-size:14px;font-weight:700;white-space:nowrap}
.sep{width:1px;height:18px;background:var(--bdr);flex-shrink:0}
.btn{font-family:inherit;font-size:12px;font-weight:500;padding:5px 12px;
  border-radius:7px;cursor:pointer;border:1px solid var(--bdr2);
  background:var(--sur);color:var(--txt);white-space:nowrap;transition:background .12s}
.btn:hover{background:var(--bg)}
.btn.pri{background:var(--acc);color:#fff;border-color:var(--acc)}
.btn.pri:hover{background:#163472}
.btn.grn{background:#2a6128;color:#fff;border-color:#2a6128}
.btn.grn:hover{background:#1d4a1c}
.btn.red{background:#b02828;color:#fff;border-color:#b02828}
.btn.red:hover{background:#891f1f}
#stat-bar{display:flex;gap:6px;flex:1;align-items:center;overflow:hidden}
.chip{font-size:11px;background:var(--bg);border-radius:20px;padding:2px 9px;color:var(--mut);white-space:nowrap}
.chip b{color:var(--txt);font-weight:600}
#mode-tag{font-size:11px;color:var(--mut);padding:3px 8px;background:var(--bg);border-radius:6px;white-space:nowrap}
#sync-status{font-size:11px;padding:3px 10px;border-radius:6px;white-space:nowrap;font-weight:500}
#sync-status.ok{background:#e2f5ee;color:#0a4d36}
#sync-status.saving{background:#fdf0e0;color:#6b3a10}
#sync-status.err{background:#fce8ec;color:#7a1f30}
#sync-status.local{background:#f0efec;color:#3a3830}
.tbr{display:flex;gap:6px;margin-left:auto;align-items:center;flex-shrink:0}

/* CANVAS */
#wrap{position:fixed;top:52px;left:0;right:0;bottom:0;overflow:hidden;background:var(--bg)}
#wrap::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle,#c8c4bc 1px,transparent 1px);
  background-size:var(--grid) var(--grid);
  background-position:var(--grid-ox,0px) var(--grid-oy,0px)}
#canvas{position:absolute;transform-origin:0 0;width:6000px;height:4000px;z-index:1}
#svg-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2}

/* NODES */
.node{position:absolute;z-index:10;background:var(--sur);border:1px solid var(--bdr);
  border-radius:var(--r);box-shadow:var(--sh);min-width:155px;max-width:195px;
  user-select:none;transition:box-shadow .12s,border-color .12s}
.node:hover{border-color:var(--bdr2);box-shadow:0 4px 16px rgba(0,0,0,.12)}
.node.sel{border:2px solid var(--acc);box-shadow:0 0 0 3px rgba(27,67,128,.12)}
.node.cm{cursor:crosshair}
.node.cm:hover{border:2px solid #2a6128;box-shadow:0 0 0 3px rgba(42,97,40,.15)}
.node.cf{border:2px solid #2a6128;box-shadow:0 0 0 3px rgba(42,97,40,.2)}

.exec-box{padding:10px 14px 11px;border-radius:var(--r);cursor:grab}
.exec-box:active{cursor:grabbing}
.exec-top{display:flex;align-items:flex-start}
.et{font-size:13px;font-weight:700;line-height:1.3}
.es{font-size:10px;margin-top:2px;opacity:.65}

.node-head{padding:8px 10px 7px;border-radius:var(--r) var(--r) 0 0;
  display:flex;align-items:center;gap:5px}
.nl{font-size:12px;font-weight:700;line-height:1.3}
.ns{font-size:10px;opacity:.6;margin-top:1px}
.mcnt{font-size:10px;font-weight:400;opacity:.65}
.nacts{display:flex;gap:2px;opacity:0;transition:opacity .15s;flex-shrink:0}
.node:hover .nacts{opacity:1}
.exec-box .nacts{opacity:0}
.node:hover .exec-box .nacts{opacity:1}
.nab{font-size:11px;padding:2px 5px;border-radius:4px;cursor:pointer;border:none;background:transparent;color:inherit}
.nab:hover{background:rgba(0,0,0,.1)}
.node-body{padding:2px 0 4px}
.mrow{display:flex;align-items:center;padding:3px 10px;font-size:11px;cursor:pointer;transition:background .1s;gap:4px}
.mrow:hover{background:var(--bg)}
.mn{flex:1}
.m-rank-inline{font-size:9px;color:var(--mut);margin-left:2px;opacity:.8}
.mr{font-size:10px;color:var(--mut);white-space:nowrap}
.addm{width:100%;text-align:center;font-size:11px;color:var(--lt);
  padding:4px 0;cursor:pointer;border-top:1px solid var(--bdr);
  border-radius:0 0 var(--r) var(--r);transition:color .12s,background .12s}
.addm:hover{color:var(--acc);background:var(--acc2)}

/* colors */
.c0 .node-head,.c0 .exec-box{background:#e8f0fb;color:#1a3d7a}
.c1 .node-head,.c1 .exec-box{background:#e2f5ee;color:#0a4d36}
.c2 .node-head,.c2 .exec-box{background:#fdf0e0;color:#6b3a10}
.c3 .node-head,.c3 .exec-box{background:#fce8ec;color:#7a1f30}
.c4 .node-head,.c4 .exec-box{background:#eef4e2;color:#2d5b0e}
.c5 .node-head,.c5 .exec-box{background:#eeecfd;color:#3a2c8a}
.c6 .node-head,.c6 .exec-box{background:#fdeee8;color:#7a3018}
.c7 .node-head,.c7 .exec-box{background:#f0efec;color:#3a3830}
.c8 .node-head,.c8 .exec-box{background:#1c1b18;color:#fff}

/* DIVISION NODE */
.div-wrap{border-radius:var(--r);overflow:visible}
.div-head{padding:8px 12px 7px;border-radius:var(--r) var(--r) 0 0;
  display:flex;align-items:center;gap:5px;cursor:grab}
.div-head:active{cursor:grabbing}
.div-label{font-size:12px;font-weight:700;flex:1}
.div-sub{font-size:10px;opacity:.6;margin-top:1px}
.div-members{padding:2px 0 2px;border-bottom:1px solid var(--bdr)}
/* division colors – slightly deeper tint to distinguish from team */
.c0 .div-head{background:#cddff7;color:#0f2e6b}
.c1 .div-head{background:#b8ecd8;color:#064030}
.c2 .div-head{background:#fae3c0;color:#5a2f08}
.c3 .div-head{background:#f7cdd5;color:#6a1226}
.c4 .div-head{background:#daedc4;color:#214a08}
.c5 .div-head{background:#dddafe;color:#2a1c7a}
.c6 .div-head{background:#f9d9cb;color:#6a220e}
.c7 .div-head{background:#e3e0db;color:#2e2c26}
.c8 .div-head{background:#333;color:#fff}

/* HINT */
#hint{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);
  background:#2a6128;color:#fff;font-size:12px;font-weight:500;
  padding:8px 20px;border-radius:20px;z-index:400;box-shadow:var(--sh2);
  pointer-events:none;display:none;white-space:nowrap}

/* ZOOM */
#zbar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:250;
  display:flex;gap:4px;align-items:center;background:var(--sur);
  border:1px solid var(--bdr);border-radius:20px;padding:4px 8px;box-shadow:var(--sh)}
#zbar button{font-size:14px;width:26px;height:26px;border:none;background:transparent;cursor:pointer;border-radius:6px;color:var(--txt)}
#zbar button:hover{background:var(--bg)}
#zlbl{font-size:11px;color:var(--mut);min-width:38px;text-align:center}

/* DASHBOARD */
#dash{
  position:fixed;top:52px;left:0;bottom:0;z-index:200;
  width:260px;background:var(--sur);border-right:1px solid var(--bdr);
  display:flex;flex-direction:column;overflow:hidden;
  transform:translateX(-260px);transition:transform .22s ease;
}
#dash.open{transform:translateX(0)}
#dash-toggle{
  position:fixed;top:60px;left:0;z-index:201;
  background:var(--sur);border:1px solid var(--bdr);border-left:none;
  border-radius:0 8px 8px 0;padding:8px 7px;cursor:pointer;
  font-size:13px;transition:left .22s ease;box-shadow:2px 2px 6px rgba(0,0,0,.07);
}
#dash.open ~ #dash-toggle,
#dash-toggle.shifted{left:260px}
#dash-inner{flex:1;overflow-y:auto;padding:14px 12px 20px}
#dash-inner::-webkit-scrollbar{width:4px}
#dash-inner::-webkit-scrollbar-track{background:transparent}
#dash-inner::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:4px}
.dash-title{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between}
.dash-total{background:var(--acc);color:#fff;border-radius:10px;
  padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.dash-total .big{font-size:26px;font-weight:700;line-height:1}
.dash-total .lbl{font-size:11px;opacity:.82;margin-top:2px}
.dash-section{margin-bottom:16px}
.dash-section-title{font-size:10px;font-weight:700;color:var(--mut);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;padding:0 2px}
.dash-div-card{background:var(--bg);border-radius:8px;margin-bottom:6px;overflow:hidden;cursor:pointer;transition:box-shadow .12s}
.dash-div-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.dash-div-head{display:flex;align-items:center;gap:8px;padding:8px 10px}
.dash-div-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dash-div-name{font-size:12px;font-weight:600;flex:1;color:var(--txt)}
.dash-div-cnt{font-size:12px;font-weight:700;color:var(--acc)}
.dash-div-bar{height:3px;background:var(--bdr);margin:0 10px 8px;border-radius:2px;overflow:hidden}
.dash-div-bar-fill{height:100%;border-radius:2px;transition:width .4s ease}
.dash-team-list{padding:0 10px 6px}
.dash-team-row{display:flex;align-items:center;gap:6px;padding:3px 0;border-top:1px solid var(--bdr)}
.dash-team-row:first-child{border-top:none}
.dash-team-name{font-size:11px;color:var(--mut);flex:1}
.dash-team-cnt{font-size:11px;font-weight:600;color:var(--txt)}
.dash-rank-section{margin-bottom:16px}
.dash-rank-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--bdr)}
.dash-rank-row:last-child{border-bottom:none}
.dash-rank-name{font-size:11px;color:var(--txt);flex:1}
.dash-rank-bar-wrap{width:80px;height:5px;background:var(--bdr);border-radius:3px;overflow:hidden}
.dash-rank-bar{height:100%;background:var(--acc);border-radius:3px;transition:width .4s ease}
.dash-rank-cnt{font-size:11px;font-weight:600;color:var(--mut);min-width:24px;text-align:right}
.dash-no-data{font-size:11px;color:var(--lt);text-align:center;padding:16px 0}

/* shift canvas when dash open */
#wrap.dash-open{left:260px}
#mmap.dash-open{right:16px}

/* MINIMAP */
#mmap{position:fixed;bottom:16px;right:16px;z-index:250;width:160px;height:110px;
  background:rgba(255,255,255,.92);border:1px solid var(--bdr);border-radius:8px;
  overflow:hidden;box-shadow:var(--sh)}
#mmc{width:100%;height:100%}

/* MODAL */
#mbg{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.38);
  display:none;align-items:center;justify-content:center}
#mbg.open{display:flex}
#mbox{background:var(--sur);border-radius:14px;padding:24px;width:340px;
  max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.22)}
#mbox h3{font-size:15px;font-weight:700;margin-bottom:18px}
.field{margin-bottom:13px}
.field label{font-size:12px;color:var(--mut);display:block;margin-bottom:5px;font-weight:500}
.field input,.field select{width:100%;font-family:inherit;font-size:13px;
  padding:7px 10px;border:1px solid var(--bdr2);border-radius:7px;
  background:var(--bg);color:var(--txt);outline:none}
.field input:focus,.field select:focus{border-color:var(--acc);background:#fff}
.frow{display:flex;gap:8px}.frow .field{flex:1}
.mbtns{display:flex;gap:8px;margin-top:18px}
.mbtns .btn{flex:1;text-align:center;padding:8px}

/* CTX */
#ctx{position:fixed;z-index:500;background:var(--sur);border:1px solid var(--bdr);
  border-radius:9px;box-shadow:var(--sh2);padding:6px;min-width:150px;display:none}
#ctx.open{display:block}
.ci{padding:7px 12px;font-size:12px;border-radius:5px;cursor:pointer;display:flex;align-items:center;gap:8px}
.ci:hover{background:var(--bg)}
.ci.red{color:#b02828}
.cisep{height:1px;background:var(--bdr);margin:4px 0}

/* FIREBASE SETUP BANNER */
#fb-banner{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center}
#fb-box{background:var(--sur);border-radius:16px;padding:32px;width:500px;max-width:95vw;
  box-shadow:0 24px 64px rgba(0,0,0,.28)}
#fb-box h2{font-size:17px;font-weight:700;margin-bottom:8px}
#fb-box p{font-size:13px;color:var(--mut);line-height:1.7;margin-bottom:20px}
#fb-box textarea{width:100%;height:160px;font-family:'Courier New',monospace;font-size:12px;
  padding:10px;border:1px solid var(--bdr2);border-radius:8px;resize:none;
  background:#f8f7f5;color:var(--txt);outline:none}
#fb-box textarea:focus{border-color:var(--acc)}
.fb-btns{display:flex;gap:8px;margin-top:16px}
.fb-btns .btn{flex:1;padding:10px;text-align:center;font-size:13px}
#fb-skip-note{font-size:11px;color:var(--lt);margin-top:10px;text-align:center}
</style>
</head>
<body>

<!-- Firebase setup banner -->
<div id="fb-banner">
  <div id="fb-box">
    <h2>🔥 Firebase 연결 설정</h2>
    <p>Firebase Console에서 복사한 <b>firebaseConfig</b> 값을 붙여넣으세요.<br>
    설정하면 모든 직원이 실시간으로 같은 조직도를 보고 수정할 수 있습니다.</p>
    <textarea id="fb-config-input" placeholder='const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "....firebaseapp.com",
  databaseURL: "https://...-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "...",
  storageBucket: "....appspot.com",
  messagingSenderId: "...",
  appId: "..."
};'></textarea>
    <div class="fb-btns">
      <button class="btn" onclick="skipFirebase()">로컬 모드로 시작</button>
      <button class="btn pri" onclick="connectFirebase()">🔥 Firebase 연결</button>
    </div>
    <div id="fb-skip-note">로컬 모드: 내 브라우저에서만 수정됩니다. 나중에 우상단 🔥 버튼으로 다시 연결 가능.</div>
  </div>
</div>

<div id="topbar">
  <h1>에비드넷 조직도</h1>
  <div class="sep"></div>
  <div id="stat-bar"></div>
  <div class="tbr">
    <span id="sync-status" class="local">● 로컬</span>
    <span id="mode-tag">일반 모드</span>
    <button class="btn" onclick="addNode('exec')">+ 임원</button>
    <button class="btn" onclick="addNode('division')" style="background:#e8f0fb;border-color:#b5ccf0;color:#1a3d7a">+ 본부</button>
    <button class="btn" onclick="addNode('team')">+ 팀</button>
    <button class="btn grn" id="cbtn" onclick="toggleConn()">🔗 연결</button>
    <button class="btn" onclick="autoLayout()">⬛ 자동정렬</button>
    <div class="sep"></div>
    <button class="btn" onclick="document.getElementById('fb-banner').style.display='flex'" title="Firebase 재연결">🔥</button>
    <button class="btn" onclick="printOrg()">🖨 인쇄</button>
  </div>
</div>

<div id="dash">
  <div style="padding:12px 12px 8px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between">
    <span style="font-size:13px;font-weight:700">📊 인원 현황</span>
    <button onclick="toggleDash()" style="font-size:11px;border:none;background:transparent;cursor:pointer;color:var(--mut)">닫기</button>
  </div>
  <div id="dash-inner"></div>
</div>
<button id="dash-toggle" onclick="toggleDash()" title="인원 현황">📊</button>

<div id="wrap">
  <div id="canvas"><svg id="svg-layer"></svg></div>
</div>

<div id="hint">🔗 하위 노드를 클릭하세요 — ESC 취소</div>

<div id="zbar">
  <button onclick="doZoom(-0.1)">−</button>
  <span id="zlbl">100%</span>
  <button onclick="doZoom(0.1)">+</button>
  <button onclick="fitView()" style="font-size:11px;width:auto;padding:0 7px">맞춤</button>
</div>
<div id="mmap"><canvas id="mmc"></canvas></div>

<div id="mbg">
  <div id="mbox">
    <h3 id="mtitle"></h3>
    <div id="mbody"></div>
    <div class="mbtns" id="mbtns"></div>
  </div>
</div>
<div id="ctx"></div>

<script type="module">
/* ═══════════════════════════════════════
   FIREBASE DYNAMIC IMPORT
═══════════════════════════════════════ */
let db = null;
let fbRef = null;
let isFirebase = false;
let saveTimeout = null;

window.connectFirebase = async function() {
  const raw = document.getElementById('fb-config-input').value.trim();
  if (!raw) return alert('설정값을 붙여넣어 주세요');

  // parse firebaseConfig object from pasted text
  let cfg;
  try {
    // extract the object literal
    const objStr = raw.replace(/^.*?=\s*/, '').replace(/;?\s*$/, '');
    cfg = new Function('return ' + objStr)();
  } catch(e) {
    alert('설정값 형식이 올바르지 않습니다.\nfirebaseConfig = { ... } 부분을 전체 복사해주세요.');
    return;
  }

  if (!cfg.databaseURL) {
    alert('databaseURL이 없습니다.\nRealtime Database를 먼저 생성해주세요.');
    return;
  }

  try {
    setSyncStatus('saving', '연결 중...');
    const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const { getDatabase, ref, set, onValue } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');

    const app = initializeApp(cfg);
    db = getDatabase(app);
    fbRef = ref(db, 'orgchart');
    isFirebase = true;

    // save config to localStorage
    localStorage.setItem('fb_config', JSON.stringify(cfg));

    // listen for realtime updates
    onValue(fbRef, (snapshot) => {
      const data = snapshot.val();
      if (data) {
        // only update if different from current (avoid re-render on own save)
        const incoming = JSON.stringify(data);
        const current  = JSON.stringify(S);
        if (incoming !== current) {
          S = data;
          nid = Math.max(...S.nodes.map(n => n.id)) + 1;
          render();
        }
      } else {
        // no data yet — push current state
        pushToFirebase();
      }
      setSyncStatus('ok', '● 실시간 동기화 중');
    }, (error) => {
      setSyncStatus('err', '● 연결 오류');
      console.error(error);
    });

    window._fbSet = set;
    window._fbRef = fbRef;

    document.getElementById('fb-banner').style.display = 'none';
    setSyncStatus('ok', '● 실시간 동기화 중');

  } catch(e) {
    setSyncStatus('err', '● 연결 실패');
    alert('Firebase 연결 실패: ' + e.message);
    console.error(e);
  }
};

window.skipFirebase = function() {
  document.getElementById('fb-banner').style.display = 'none';
  setSyncStatus('local', '● 로컬 모드');
};

// Auto-reconnect from localStorage
window.addEventListener('load', async () => {
  const saved = localStorage.getItem('fb_config');
  if (saved) {
    try {
      document.getElementById('fb-config-input').value =
        'const firebaseConfig = ' + saved;
      await window.connectFirebase();
    } catch(e) {
      console.warn('Auto-reconnect failed', e);
      document.getElementById('fb-banner').style.display = 'flex';
    }
  }
  render();
  setTimeout(fitView, 200);
});

function pushToFirebase() {
  if (!isFirebase || !window._fbSet || !window._fbRef) return;
  setSyncStatus('saving', '● 저장 중...');
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    window._fbSet(window._fbRef, JSON.parse(JSON.stringify(S)))
      .then(() => setSyncStatus('ok', '● 실시간 동기화 중'))
      .catch(e => { setSyncStatus('err', '● 저장 실패'); console.error(e); });
  }, 600); // debounce 600ms
}

function drawEdges() {
  const svg = document.getElementById('svg-layer');
  svg.innerHTML = `<defs>
    <marker id="arr" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M1,1 L7,4 L1,7" fill="none" stroke="#b0ab9e" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker></defs>`;

  S.edges.forEach(([a, b]) => {
    const na = S.nodes.find(n => n.id === a);
    const nb = S.nodes.find(n => n.id === b);
    if (!na || !nb) return;
    const ea = document.getElementById('n' + a);
    const eb = document.getElementById('n' + b);
    if (!ea || !eb) return;

    const aw = ea.offsetWidth  || 160, ah = ea.offsetHeight || 50;
    const bw = eb.offsetWidth  || 160;
    const ax = na.x + aw / 2, ay = na.y + ah;
    const bx = nb.x + bw / 2, by = nb.y;

    // 수직 1자: 두 노드의 left x가 같거나 중심 X가 30px 이내
    const sameCol = (na.x === nb.x) || Math.abs(ax - bx) < 30;
    let d;
    if (sameCol) {
      d = `M ${ax} ${ay} L ${ax} ${by}`;
    } else {
      const my = ay + Math.round((by - ay) / 2);
      d = `M ${ax} ${ay} L ${ax} ${my} L ${bx} ${my} L ${bx} ${by}`;
    }

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', '#b0ab9e');
    path.setAttribute('stroke-width', '1.4');
    path.setAttribute('stroke-linejoin', 'miter');
    path.setAttribute('marker-end', 'url(#arr)');
    path.style.pointerEvents = 'stroke';
    path.style.cursor = 'pointer';
    path.addEventListener('contextmenu', e => { e.preventDefault(); showCtx(e, {t:'edge', a, b}); });
    svg.appendChild(path);

    // wide invisible hit area for easier clicking
    const hit = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    hit.setAttribute('d', d);
    hit.setAttribute('fill', 'none');
    hit.setAttribute('stroke', 'transparent');
    hit.setAttribute('stroke-width', '12');
    hit.style.pointerEvents = 'stroke';
    hit.style.cursor = 'pointer';
    hit.addEventListener('contextmenu', e => { e.preventDefault(); showCtx(e, {t:'edge', a, b}); });
    hit.addEventListener('click', e => {
      if (!connMode) { e.stopPropagation(); showCtx(e, {t:'edge', a, b}); }
    });
    svg.appendChild(hit);
  });
}

/* ═══════════════════════════════════════
   DRAG
═══════════════════════════════════════ */
function startDrag(e, n) {
  if (connMode || e.button !== 0) return;
  e.preventDefault(); e.stopPropagation();
  dragN = n;
  dox = e.clientX / sc - px / sc - n.x;
  doy = e.clientY / sc - py / sc - n.y;
}

window.addEventListener('mousemove', e => {
  if (dragN) {
    dragN.x = Math.max(0, snap(e.clientX / sc - px / sc - dox));
    dragN.y = Math.max(0, snap(e.clientY / sc - py / sc - doy));
    const el = document.getElementById('n' + dragN.id);
    if (el) { el.style.left = dragN.x + 'px'; el.style.top = dragN.y + 'px'; }
    drawEdges(); drawMinimap();
    return;
  }
  if (panning) {
    px = ppx + (e.clientX - psx);
    py = ppy + (e.clientY - psy);
    applyT(); drawMinimap();
  }
});
window.addEventListener('mouseup', () => {
  if (dragN) { save(); dragN = null; }
  panning = false;
});

/* ═══════════════════════════════════════
   PAN + ZOOM
═══════════════════════════════════════ */
const wrap = document.getElementById('wrap');
wrap.addEventListener('mousedown', e => {
  if (e.button === 1 || e.target === wrap ||
      e.target.id === 'canvas' || e.target.id === 'svg-layer') {
    panning = true; psx = e.clientX; psy = e.clientY; ppx = px; ppy = py;
    e.preventDefault();
  }
});
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.07 : 0.07;
  const r = wrap.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const old = sc;
  sc = Math.min(2, Math.max(0.12, sc + delta));
  px = mx - (mx - px) * (sc / old);
  py = my - (my - py) * (sc / old);
  applyT(); drawMinimap();
}, { passive: false });

function applyT() {
  document.getElementById('canvas').style.transform = `translate(${px}px,${py}px) scale(${sc})`;
  document.getElementById('zlbl').textContent = Math.round(sc * 100) + '%';
  const gx = ((px % (GRID * sc)) + GRID * sc) % (GRID * sc);
  const gy = ((py % (GRID * sc)) + GRID * sc) % (GRID * sc);
  wrap.style.setProperty('--grid-ox', gx + 'px');
  wrap.style.setProperty('--grid-oy', gy + 'px');
  wrap.style.setProperty('--grid', (GRID * sc) + 'px');
}
function doZoom(d) {
  const r = wrap.getBoundingClientRect(), cx = r.width / 2, cy = r.height / 2;
  const old = sc; sc = Math.min(2, Math.max(0.12, sc + d));
  px = cx - (cx - px) * (sc / old); py = cy - (cy - py) * (sc / old);
  applyT(); drawMinimap();
}
function fitView() {
  if (!S.nodes.length) return;
  const pad = 60;
  const xs = S.nodes.map(n => n.x), ys = S.nodes.map(n => n.y);
  const minX = Math.min(...xs) - pad, minY = Math.min(...ys) - pad;
  const maxX = Math.max(...xs) + 220,  maxY = Math.max(...ys) + 400;
  const r = wrap.getBoundingClientRect();
  sc = Math.min(r.width / (maxX - minX), r.height / (maxY - minY), 1) * 0.9;
  px = -minX * sc + (r.width - (maxX - minX) * sc) / 2;
  py = -minY * sc + 20;
  applyT(); drawMinimap();
}

function toggleConn() {
  connMode = !connMode; connFrom = null;
  document.querySelectorAll('.node').forEach(el => { el.style.outline = ''; el.classList.toggle('cm', connMode); });
  document.getElementById('hint').style.display = connMode ? 'block' : 'none';
  document.getElementById('cbtn').textContent = connMode ? '✕ 취소' : '🔗 연결';
  document.getElementById('cbtn').className = 'btn ' + (connMode ? 'red' : 'grn');
  document.getElementById('mode-tag').textContent = connMode ? '🔗 상위→하위 순서로 클릭' : '일반 모드';
}
function handleConn(id, e) {
  e.stopPropagation();
  if (!connFrom) {
    connFrom = id;
    document.getElementById('n' + id).classList.add('cf');
    document.getElementById('hint').textContent = `✅ "${S.nodes.find(n => n.id === id)?.label}" 선택 → 하위 클릭`;
  } else {
    if (connFrom === id) { document.getElementById('n' + id).classList.remove('cf'); connFrom = null; return; }
    if (!S.edges.some(([a, b]) => a === connFrom && b === id)) S.edges.push([connFrom, id]);
    document.querySelectorAll('.node').forEach(el => el.classList.remove('cf'));
    connFrom = null;
    document.getElementById('hint').textContent = '🔗 하위 노드를 클릭하세요 — ESC 취소';
    drawEdges(); save();
  }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { if (connMode) toggleConn(); closeModal(); document.getElementById('ctx').classList.remove('open'); }
});

function showCtx(e, t) {
  ctxT = t;
  const ctx = document.getElementById('ctx');
  let h = '';
  if (t.t === 'node') {
    h = `<div class="ci" onclick="ctxAct('edit')">✏️ 편집</div>
         <div class="ci" onclick="ctxAct('conn')">🔗 연결 시작</div>
         <div class="cisep"></div>
         <div class="ci red" onclick="ctxAct('del')">🗑 삭제</div>`;
  } else if (t.t === 'member') {
    h = `<div class="ci" onclick="ctxAct('edit')">✏️ 직원 편집</div>
         <div class="ci red" onclick="ctxAct('del')">🗑 직원 삭제</div>`;
  } else if (t.t === 'edge') {
    const la = S.nodes.find(n => n.id === t.a)?.label || '';
    const lb = S.nodes.find(n => n.id === t.b)?.label || '';
    h = `<div class="ci" style="color:var(--mut);font-size:11px;pointer-events:none">${la} → ${lb}</div>
         <div class="cisep"></div>
         <div class="ci red" onclick="ctxAct('del')">✂️ 연결 끊기</div>`;
  }
  ctx.innerHTML = h; ctx.style.left = e.clientX + 'px'; ctx.style.top = e.clientY + 'px';
  ctx.classList.add('open');
}
function ctxAct(a) {
  document.getElementById('ctx').classList.remove('open');
  if (!ctxT) return;
  const {t, nid, idx} = ctxT;
  if (a === 'edit') { if (t === 'node') openEdit(nid); else if (t === 'member') openEditMember(nid, idx); }
  else if (a === 'conn') { if (!connMode) toggleConn(); handleConn(nid, {stopPropagation:()=>{}}); }
  else if (a === 'del') {
    if (t === 'node') deleteNode(nid);
    else if (t === 'member') deleteMember(nid, idx);
    else if (t === 'edge') { S.edges = S.edges.filter(([a,b]) => !(a===ctxT.a && b===ctxT.b)); drawEdges(); save(); }
  }
}

/* ═══════════════════════════════════════
   AUTO LAYOUT
═══════════════════════════════════════ */
function autoLayout() {
  if (!confirm('자동 정렬을 실행합니다. 현재 배치가 바뀝니다.')) return;
  const levels = {};
  const roots = S.nodes.filter(n => !S.edges.some(([,b]) => b === n.id)).map(n => n.id);
  if (!roots.length) return;
  roots.forEach(id => levels[id] = 0);
  const q = [...roots];
  while (q.length) {
    const id = q.shift();
    S.edges.filter(([a]) => a === id).forEach(([,b]) => { if (levels[b]===undefined){levels[b]=(levels[id]||0)+1;q.push(b);} });
  }
  S.nodes.forEach(n => { if (levels[n.id]===undefined) levels[n.id]=0; });
  const byLv = {};
  S.nodes.forEach(n => { const l=levels[n.id]; if (!byLv[l]) byLv[l]=[]; byLv[l].push(n); });
  Object.entries(byLv).forEach(([lv, nodes]) => {
    const totalW = (nodes.length-1)*220;
    const startX = snap(Math.max(60, (3200-totalW)/2));
    nodes.forEach((n,i) => { n.x=snap(startX+i*220); n.y=snap(60+lv*260); });
  });
  render(); save(); setTimeout(fitView, 150);
}

   MINIMAP
═══════════════════════════════════════ */
function drawMinimap() {
  const c = document.getElementById('mmc'), ctx = c.getContext('2d');
  const W=160, H=110; c.width=W; c.height=H; ctx.clearRect(0,0,W,H);
  if (!S.nodes.length) return;
  const xs=S.nodes.map(n=>n.x), ys=S.nodes.map(n=>n.y);
  const mnX=Math.min(...xs), mnY=Math.min(...ys), mxX=Math.max(...xs)+220, mxY=Math.max(...ys)+300;
  const s=Math.min(W/(mxX-mnX+1),H/(mxY-mnY+1))*.88;
  S.edges.forEach(([a,b]) => {
    const na=S.nodes.find(n=>n.id===a), nb=S.nodes.find(n=>n.id===b); if (!na||!nb) return;
    const ax=(na.x-mnX)*s+4, ay=(na.y-mnY)*s+4, bx=(nb.x-mnX)*s+4, by=(nb.y-mnY)*s+4, my=(ay+by)/2;
    ctx.beginPath();
    if (Math.abs(ax-bx)<2) { ctx.moveTo(ax,ay); ctx.lineTo(bx,by); }
    else { ctx.moveTo(ax,ay); ctx.lineTo(ax,my); ctx.lineTo(bx,my); ctx.lineTo(bx,by); }
    ctx.strokeStyle='#c8c4bc'; ctx.lineWidth=.5; ctx.stroke();
  });
  S.nodes.forEach(n => {
    ctx.fillStyle = n.type==='exec' ? '#1b4380' : n.type==='division' ? '#3a6bc4' : '#6b9dd4';
    ctx.fillRect((n.x-mnX)*s+2,(n.y-mnY)*s+2,14,7);
  });
  const r=wrap.getBoundingClientRect();
  ctx.strokeStyle='#1b4380'; ctx.lineWidth=1;
  ctx.strokeRect((-px/sc-mnX)*s+4,(-py/sc-mnY)*s+4,(r.width/sc)*s,(r.height/sc)*s);
}

/* ═══════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════ */
const DOT_COLORS = ['#4e8fde','#2eab7a','#e8951a','#d95078','#6ab042','#7b68d4','#d9733a','#8a8680','#444'];

function toggleDash() {
  const dash = document.getElementById('dash');
  const wrap = document.getElementById('wrap');
  const mmap = document.getElementById('mmap');
  const tog  = document.getElementById('dash-toggle');
  const open = dash.classList.toggle('open');
  wrap.classList.toggle('dash-open', open);
  mmap.classList.toggle('dash-open', open);
  tog.classList.toggle('shifted', open);
  if (open) renderDash();
}

function renderDash() {
  const el = document.getElementById('dash-inner');
  if (!el) return;

  const nodes = S.nodes;
  const edges = S.edges;

  // helper: get all descendant node ids (BFS)
  function descendants(id) {
    const result = [], q = [id];
    while (q.length) {
      const cur = q.shift();
      edges.filter(([a]) => a === cur).forEach(([, b]) => { result.push(b); q.push(b); });
    }
    return result;
  }

  // total headcount
  const total = nodes.reduce((s, n) => s + (n.members?.length || 0), 0);

  // divisions
  const divNodes = nodes.filter(n => n.type === 'division');
  // teams
  const teamNodes = nodes.filter(n => n.type === 'team');
  // unattached teams (not under any division)
  const divIds = new Set(divNodes.map(n => n.id));
  const underDiv = new Set(edges.filter(([a]) => divIds.has(a)).map(([, b]) => b));

  // rank counts
  const rankCount = {};
  nodes.forEach(n => (n.members || []).forEach(m => {
    rankCount[m.rank] = (rankCount[m.rank] || 0) + 1;
  }));
  const rankSorted = Object.entries(rankCount).sort((a, b) => b[1] - a[1]);
  const maxRank = rankSorted[0]?.[1] || 1;

  // max total for bar width
  const maxDiv = Math.max(...divNodes.map(d => {
    const desc = descendants(d.id);
    return (d.members?.length || 0) + desc.reduce((s, id) => {
      const nd = nodes.find(n => n.id === id);
      return s + (nd?.members?.length || 0);
    }, 0);
  }), 1);

  let html = '';

  // ── Total card ──
  html += `<div class="dash-total">
    <div><div class="big">${total}</div><div class="lbl">총 인원</div></div>
    <div style="margin-left:auto;text-align:right;font-size:11px;opacity:.85;line-height:1.8">
      본부 ${divNodes.length}개<br>팀 ${teamNodes.length}개
    </div>
  </div>`;

  // ── Divisions ──
  if (divNodes.length) {
    html += `<div class="dash-section"><div class="dash-section-title">본부별 인원</div>`;
    divNodes.forEach((d, di) => {
      const desc = descendants(d.id);
      const childTeams = desc.map(id => nodes.find(n => n.id === id)).filter(n => n?.type === 'team');
      const divMem = d.members?.length || 0;
      const teamMem = childTeams.reduce((s, t) => s + (t.members?.length || 0), 0);
      const total2 = divMem + teamMem;
      const pct = Math.round(total2 / maxDiv * 100);
      const dot = DOT_COLORS[d.color % DOT_COLORS.length];

      html += `<div class="dash-div-card">
        <div class="dash-div-head">
          <span class="dash-div-dot" style="background:${dot}"></span>
          <span class="dash-div-name">${d.label}</span>
          <span class="dash-div-cnt">${total2}명</span>
        </div>
        <div class="dash-div-bar"><div class="dash-div-bar-fill" style="width:${pct}%;background:${dot}"></div></div>`;

      if (divMem > 0) {
        html += `<div class="dash-team-list">
          <div class="dash-team-row">
            <span class="dash-team-name" style="color:var(--txt);font-weight:500">본부 직속</span>
            <span class="dash-team-cnt">${divMem}명</span>
          </div>
        </div>`;
      }
      if (childTeams.length) {
        html += `<div class="dash-team-list">`;
        childTeams.forEach(t => {
          html += `<div class="dash-team-row">
            <span class="dash-team-name">${t.label}</span>
            <span class="dash-team-cnt">${t.members?.length || 0}명</span>
          </div>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  }

  // ── Standalone teams (not under any division) ──
  const standaloneTeams = teamNodes.filter(t => !underDiv.has(t.id));
  if (standaloneTeams.length) {
    html += `<div class="dash-section"><div class="dash-section-title">팀별 인원 (독립)</div>`;
    standaloneTeams.forEach(t => {
      const cnt = t.members?.length || 0;
      const pct = Math.round(cnt / Math.max(total, 1) * 100);
      const dot = DOT_COLORS[t.color % DOT_COLORS.length];
      html += `<div class="dash-div-card">
        <div class="dash-div-head">
          <span class="dash-div-dot" style="background:${dot}"></span>
          <span class="dash-div-name">${t.label}</span>
          <span class="dash-div-cnt">${cnt}명</span>
        </div>
        <div class="dash-div-bar"><div class="dash-div-bar-fill" style="width:${Math.round(cnt/Math.max(...teamNodes.map(x=>x.members?.length||0),1)*100)}%;background:${dot}"></div></div>
      </div>`;
    });
    html += `</div>`;
  }

  // ── Rank breakdown ──
  if (rankSorted.length) {
    html += `<div class="dash-section"><div class="dash-section-title">직급별 인원</div>`;
    rankSorted.forEach(([rank, cnt]) => {
      const pct = Math.round(cnt / maxRank * 100);
      html += `<div class="dash-rank-row">
        <span class="dash-rank-name">${rank}</span>
        <div class="dash-rank-bar-wrap"><div class="dash-rank-bar" style="width:${pct}%"></div></div>
        <span class="dash-rank-cnt">${cnt}명</span>
      </div>`;
    });
    html += `</div>`;
  }

  if (!total) html += `<div class="dash-no-data">직원을 추가하면<br>여기서 현황을 볼 수 있어요</div>`;

  el.innerHTML = html;
}

// re-render dash on every render() call
const _origRender = render;
window._dashAutoUpdate = function() {
  const dash = document.getElementById('dash');
  if (dash?.classList.contains('open')) renderDash();
};

window.toggleDash = toggleDash;
window.renderDash = renderDash;

window.closeModal   = closeModal;
window.openEdit     = openEdit;
window.addNode      = addNode;
window.autoLayout   = autoLayout;
window.printOrg     = printOrg;
window.toggleConn   = toggleConn;
window.fitView      = fitView;
window.doZoom       = doZoom;
window.deleteNode   = deleteNode;
window.deleteMember = deleteMember;
window.openAddMember= openAddMember;
window.openEditMember=openEditMember;
window.ctxAct       = ctxAct;
window.addEventListener('resize', drawMinimap);
</script>
